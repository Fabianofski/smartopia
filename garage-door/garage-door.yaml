esphome:
  name: garage-door
  friendly_name: Garage Door

esp8266:
  board: nodemcuv2

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "0dfjrik/ON8QuCF7iDR2hFOQRRQxzu+LlPUyVicYbkI="

ota:
  - platform: esphome
    password: "8291cfadf1d27f8cd18ce9366d5d4f62"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Garage-Door Fallback Hotspot"
    password: "QrKGDbYcCfiZ"

output:
  - platform: gpio
    pin: D6
    id: out_1
    inverted: true

  - platform: gpio
    pin: D7
    id: out_2
    inverted: true

  - platform: gpio
    pin: D2
    id: out_3
    inverted: true

  - platform: gpio
    pin: D1
    id: out_4
    inverted: true


button:
